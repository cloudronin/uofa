name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    # GitHub Actions docs: "you cannot use both paths-filter and paths-ignore
    # filters in the same event." So these patterns include positive matches
    # only. site/README.md and site/tests/** are dev-facing artifacts but
    # changes to them are infrequent and a re-deploy on those is harmless.
    paths:
      - 'site/**'
      - 'README.md'
      - 'docs/**'
      - 'pyproject.toml'
      - 'packs/**'
      - 'src/uofa_cli/**'
      - 'snapshots/**'
      - '.github/workflows/deploy-site.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'README.md'
      - 'docs/**'
      - 'pyproject.toml'
      - 'packs/**'
      - 'src/uofa_cli/**'
      - 'snapshots/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Java (for Jena rule engine in snapshot check)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Jena weakener engine JAR
        working-directory: ${{ github.workspace }}/src/weakener-engine
        run: mvn package -q -DskipTests

      - name: Install uofa from source
        working-directory: ${{ github.workspace }}
        run: pip install -e . --quiet

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          PUBLIC_BUILD_SHA: ${{ github.sha }}
          # On push events the commit timestamp is in head_commit. On PR events
          # head_commit isn't populated and this falls through empty, which the
          # SiteFooter component handles by falling back to today's date — fine
          # for preview builds since they never deploy to production.
          PUBLIC_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    # Deploy only from main. PRs and feature-branch dispatches build-and-validate
    # without publishing to uofa.net.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
