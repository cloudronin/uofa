name: Release Wheels

# PR 1 scope: build a single py3-none-any wheel that bundles the rule-engine
# JAR (no JRE yet — system Java still required at runtime). PR 2 will add a
# per-platform matrix once JRE bundling lands.

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'hatch_build.py'
      - 'src/uofa_cli/paths.py'
      - 'src/uofa_cli/commands/rules.py'
      - 'weakener-engine/**'
      - '.github/workflows/release-wheels.yml'
  workflow_dispatch:

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build fat JAR
        run: cd weakener-engine && mvn package -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: weakener-engine-jar
          path: weakener-engine/target/uofa-weakener-engine-*.jar
          if-no-files-found: error
          retention-days: 1

  build-wheel:
    needs: build-jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Download JAR artifact into Maven target/
        uses: actions/download-artifact@v4
        with:
          name: weakener-engine-jar
          path: weakener-engine/target/

      - name: Build wheel with bundled JAR
        env:
          UOFA_BUNDLE_JAR: '1'
        run: python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: uofa-cli-wheel
          path: dist/*.whl
          if-no-files-found: error

  smoke-wheel:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # PR 1 still requires system Java at runtime (no JRE bundling yet).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: uofa-cli-wheel
          path: dist/

      - name: Install wheel into a fresh venv
        run: |
          python -m venv /tmp/uofa-venv
          /tmp/uofa-venv/bin/pip install --upgrade pip
          /tmp/uofa-venv/bin/pip install dist/*.whl

      - name: Confirm bundled JAR is present in the installed wheel
        run: |
          /tmp/uofa-venv/bin/python -c "
          from uofa_cli import paths
          jar = paths.bundled_jar()
          assert jar is not None, 'Bundled JAR missing from installed wheel'
          assert jar.exists(), f'bundled_jar() reports {jar} but it does not exist'
          print(f'OK: bundled JAR at {jar}')
          "

      - name: Run uofa check against Morrison example (no Maven invoked)
        run: |
          /tmp/uofa-venv/bin/uofa check packs/vv40/examples/morrison/cou1/uofa-morrison-cou1.jsonld
