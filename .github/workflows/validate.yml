name: Validate UofA (SHACL + Integrity + Jena Rules)

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install uofa CLI
        run: pip install -e ".[test]"

      - name: Integration tests
        run: pytest tests/test_integration.py -v

      - name: SHACL validation (all examples)
        run: uofa validate

      - name: Morrison COU1 — full C1+C2+C3 pipeline
        run: uofa check examples/morrison-cou1/uofa-morrison-cou1.jsonld --build
