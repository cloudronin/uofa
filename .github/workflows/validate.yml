name: Validate UofA (SHACL + Integrity + Jena Rules)

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            make all 
