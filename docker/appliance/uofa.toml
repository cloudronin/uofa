# Appliance project config — discovered by `uofa` via paths.find_project_root()
# (the nearest uofa.toml up from the working directory).
#
# The explanation stage ("stock Qwen") talks to the Ollama server running INSIDE
# this same container, serving the ship-target stock model (SLM spec §4: top of
# the small band — the appliance baseline and the bakeoff-gate model are the same
# artifact). The endpoint is a config line (src/uofa_cli/llm/config.py) — no code
# path changes between desktop, served-enclave, or this self-contained appliance.
[llm]
backend = "ollama"
model = "qwen2.5:7b"
base_url = "http://127.0.0.1:11434"
