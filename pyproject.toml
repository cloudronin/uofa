[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "uofa-cli"
version = "0.2.0"
description = "CLI for creating, validating, and signing Unit of Assurance evidence packages"
readme = "README.md"
license = "CC0-1.0"
requires-python = ">=3.10"
authors = [
    { name = "Vishnu Viswanathan" },
]
dependencies = [
    "pyshacl",
    "rdflib",
    "cryptography",
]

[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
uofa = "uofa_cli.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/uofa_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
