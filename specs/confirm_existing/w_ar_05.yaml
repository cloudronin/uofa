# Baseline Phase 1 adversarial spec — UofA_Adversarial_Gen_Spec_v1.1 Appendix A.
#
# Generates synthetic packages that target W-AR-05 (comparator absence or
# mismatch) by placing an inappropriate comparator against the Morrison
# COU1 hemolysis assessment.

spec_id: adv-2026-001-w-ar-05
description: >
  Baseline Phase 1 spec. Tests whether W-AR-05 (comparator absence or
  mismatch) fires on subtle synthetic packages where a comparator is
  present but inappropriate for the declared COU.

target:
  weakener: W-AR-05
  defeater_type: D3
  uncertainty_category: argument
  coverage_intent: confirm_existing

# v1.1: pack is first-class. vv40 is the default; future packs plug in here.
pack: vv40

package_context:
  base_cou: packs/vv40/examples/morrison/cou1
  # v1.1 mode:
  #   skeleton (default) — generator preserves base_cou identity and factor
  #     structure; LLM only fills targeted weakener fields. More controllable.
  #   narrative-only — legacy behavior; LLM invents COU metadata from scratch.
  mode: skeleton
  factors:
    - Model form
    - Numerical code verification
    - Discretization error
    - Output comparison
    - Relevance of the validation activities to the COU
  decision: Accepted
  mrl: 2

generation:
  model: claude-opus-4-7
  n_variants: 5
  subtlety: high
  temperature: 0.7
  max_tokens: 8000
  seed: 20260419

output:
  package_name_template: "{spec_id}-v{variant_num:02d}"
  include_provenance: true
